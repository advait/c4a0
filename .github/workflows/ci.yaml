name: c4a0 CI

on:
  push:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools with mise
        uses: jdx/mise-action@v3
        with:
          version: 2026.1.6
          install: true
          cache: true

      - name: Run CI tasks
        run: mise run ci
